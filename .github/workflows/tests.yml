name: Test Automation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual trigger for on-demand runs
  workflow_dispatch:

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # API Tests — Lightweight, run first as smoke gate
  # ──────────────────────────────────────────────
  api-tests:
    name: API Tests (Restful-Booker)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npx playwright test --project=api-tests

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # UI Tests — Require browser, run after API passes
  # ──────────────────────────────────────────────
  ui-tests:
    name: UI Tests (SauceDemo)
    runs-on: ubuntu-latest
    needs: api-tests
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        run: npx playwright test --project=ui-tests

      - name: Upload UI test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test artifacts (screenshots, traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-artifacts
          path: test-results/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Cucumber BDD Tests — readable scenario layer
  # Runs after API gate passes; requires browser matrix
  # ──────────────────────────────────────────────
  cucumber-tests:
    name: Cucumber BDD Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: api-tests
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Cucumber tests
        run: npm run test:cucumber:ui:${{ matrix.browser }}

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ matrix.browser }}
          path: cucumber-report/
          retention-days: 14
